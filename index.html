<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>旅行规划 · 动态模板 v2</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --river: #2a5f7a; --river-light: #3a7a9a; --gorge: #1a3a2a;
  --sand: #f0ead8; --bark: #8b6914; --mist: #e8f0f5;
  --stone: #4a5a5a; --red: #c0392b; --green: #2e7d52;
  --amber: #d4820a; --ink: #1a2020; --paper: #faf7f0;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: var(--paper); color: var(--ink); font-family: 'Noto Serif SC', serif; overflow-x: hidden; }

/* HERO */
.hero { background: linear-gradient(160deg, var(--gorge) 0%, var(--river) 60%, #1a4a5a 100%); padding: 64px 24px 80px; position: relative; overflow: hidden; }
.hero::before { content: ''; position: absolute; bottom: -2px; left: 0; right: 0; height: 60px; background: var(--paper); clip-path: ellipse(55% 100% at 50% 100%); }
.hero::after { content: ''; position: absolute; inset: 0; background-image: repeating-linear-gradient(45deg, transparent, transparent 40px, rgba(255,255,255,0.02) 40px, rgba(255,255,255,0.02) 80px); }
.hero-inner { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; text-align: center; }
.hero-eyebrow { font-size: 11px; letter-spacing: 6px; text-transform: uppercase; color: rgba(255,255,255,0.5); margin-bottom: 16px; }
.hero h1 { font-family: 'Playfair Display', serif; font-size: clamp(40px, 8vw, 72px); font-weight: 700; color: white; line-height: 1.05; margin-bottom: 8px; }
.hero h1 em { font-style: italic; color: #7dd3f0; }
.hero-sub { font-size: 14px; color: rgba(255,255,255,0.6); letter-spacing: 3px; margin-bottom: 32px; }
.badges { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
.badge { background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2); color: white; font-size: 12px; padding: 6px 16px; border-radius: 20px; }

/* LAYOUT */
.page { max-width: 860px; margin: 0 auto; padding: 0 20px 80px; }
.sec-head { display: flex; align-items: center; gap: 14px; padding: 40px 0 24px; border-bottom: 1px solid rgba(42,95,122,0.15); margin-bottom: 28px; }
.sec-num { font-family: 'Playfair Display', serif; font-size: 44px; font-weight: 700; color: rgba(42,95,122,0.12); line-height: 1; min-width: 52px; }
.sec-label { font-size: 13px; letter-spacing: 4px; text-transform: uppercase; color: var(--river); }
.sec-sub { font-size: 12px; color: var(--stone); margin-top: 3px; }

/* OVERVIEW */
.overview-grid { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
.ov-card { background: white; border: 1px solid rgba(42,95,122,0.12); padding: 14px 20px; border-left: 3px solid var(--river); display: flex; align-items: baseline; gap: 16px; transition: transform 0.2s; }
.ov-card:hover { transform: translateX(4px); }
.ov-card .label { font-size: 11px; letter-spacing: 2px; color: var(--river); text-transform: uppercase; min-width: 72px; flex-shrink: 0; }
.ov-card .value { font-size: 14px; color: var(--ink); font-weight: 600; line-height: 1.6; }
.tip-bar { background: linear-gradient(90deg, rgba(42,95,122,0.08), transparent); border-left: 3px solid var(--amber); padding: 12px 16px; font-size: 12px; color: var(--stone); line-height: 1.7; }
.tip-bar strong { color: var(--amber); }

/* TIMELINE */
.day-wrap { display: grid; grid-template-columns: 56px 1fr; gap: 0 20px; margin-bottom: 4px; opacity: 0; animation: slideIn 0.5s ease forwards; }
.day-wrap:nth-child(1) { animation-delay: 0.1s; }
.day-wrap:nth-child(2) { animation-delay: 0.25s; }
.day-wrap:nth-child(3) { animation-delay: 0.4s; }
.day-wrap:nth-child(4) { animation-delay: 0.55s; }
.day-wrap:nth-child(5) { animation-delay: 0.7s; }
@keyframes slideIn { from { opacity:0; transform:translateX(-16px); } to { opacity:1; transform:translateX(0); } }
.day-badge { display: flex; flex-direction: column; align-items: center; padding-top: 20px; }
.day-badge .dn { font-size: 11px; font-weight: 700; color: var(--river); background: white; border: 2px solid var(--river); width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; letter-spacing: 0; z-index: 1; position: relative; }
.day-badge .line { width: 2px; flex: 1; background: linear-gradient(var(--river), rgba(42,95,122,0.1)); min-height: 40px; margin-top: 4px; }
.day-card { background: white; border: 1px solid rgba(42,95,122,0.1); margin-bottom: 16px; overflow: hidden; }
.day-header { background: linear-gradient(90deg, var(--river), var(--river-light)); padding: 12px 18px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 4px; }
.day-title { font-size: 15px; font-weight: 600; color: white; }
.day-route { font-size: 10px; color: rgba(255,255,255,0.6); letter-spacing: 1px; }
.slots { display: grid; grid-template-columns: repeat(3,1fr); }
.slot { padding: 14px 16px; border-right: 1px solid rgba(42,95,122,0.08); }
.slot:last-child { border-right: none; }
.slot-time { font-size: 10px; letter-spacing: 1px; color: var(--amber); font-weight: 600; margin-bottom: 6px; }
.slot-icon { font-size: 18px; margin-bottom: 6px; }
.slot-name { font-size: 13px; font-weight: 600; color: var(--ink); margin-bottom: 4px; }
.slot-detail { font-size: 11px; color: var(--stone); line-height: 1.6; }
.slot-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
.slot-tag { font-size: 10px; padding: 2px 8px; background: var(--mist); color: var(--river); border-radius: 10px; }
.slot-tag.cost { background: rgba(212,130,10,0.1); color: var(--amber); }
.slot-tag.transport { background: rgba(46,125,82,0.1); color: var(--green); }
@media(max-width:600px) { .slots { grid-template-columns: 1fr; } .slot { border-right: none; border-bottom: 1px solid rgba(42,95,122,0.08); } }

/* SPOTS */
.spots-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px,1fr)); gap: 14px; }
.spot-card { background: white; border: 1px solid rgba(42,95,122,0.1); overflow: hidden; transition: transform 0.2s, box-shadow 0.2s; }
.spot-card:hover { transform: translateY(-3px); box-shadow: 0 8px 30px rgba(42,95,122,0.12); }
.spot-top { padding: 18px 18px 12px; display: flex; justify-content: space-between; align-items: flex-start; }
.spot-emoji { font-size: 32px; }
.spot-priority { font-size: 10px; padding: 3px 10px; border-radius: 10px; letter-spacing: 1px; }
.spot-priority.high { background: rgba(192,57,43,0.1); color: var(--red); }
.spot-priority.mid { background: rgba(42,95,122,0.1); color: var(--river); }
.spot-priority.low { background: rgba(74,90,90,0.1); color: var(--stone); }
.spot-body { padding: 0 18px 18px; }
.spot-name { font-size: 15px; font-weight: 600; color: var(--ink); margin-bottom: 6px; }
.spot-desc { font-size: 12px; color: var(--stone); line-height: 1.7; margin-bottom: 10px; }
.spot-meta { display: flex; gap: 10px; flex-wrap: wrap; }
.spot-meta span { font-size: 11px; color: var(--amber); }
.spot-meta span::before { content: '◆ '; font-size: 8px; }

/* FOOD */
.food-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px,1fr)); gap: 12px; }
.food-card { background: white; border: 1px solid rgba(42,95,122,0.1); padding: 16px; display: flex; gap: 12px; align-items: flex-start; transition: transform 0.2s; }
.food-card:hover { transform: translateY(-2px); }
.food-emoji { font-size: 28px; flex-shrink: 0; }
.food-name { font-size: 14px; font-weight: 600; color: var(--ink); margin-bottom: 3px; }
.food-shop { font-size: 11px; color: var(--stone); margin-bottom: 3px; }
.food-price { font-size: 12px; color: var(--amber); font-weight: 600; }
.food-note { font-size: 11px; color: var(--stone); margin-top: 3px; line-height: 1.5; }

/* HOTELS */
.hotel-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
@media(max-width:540px) { .hotel-grid { grid-template-columns: 1fr; } }
.hotel-card { background: white; border: 1px solid rgba(42,95,122,0.1); padding: 18px; border-top: 3px solid var(--river); }
.hotel-type { font-size: 10px; letter-spacing: 2px; color: var(--stone); text-transform: uppercase; margin-bottom: 8px; }
.hotel-name { font-size: 15px; font-weight: 600; color: var(--ink); margin-bottom: 4px; }
.hotel-loc { font-size: 12px; color: var(--stone); margin-bottom: 10px; }
.hotel-price { font-size: 18px; font-weight: 700; color: var(--river); font-family: 'Playfair Display', serif; margin-bottom: 8px; }
.hotel-tags { display: flex; flex-wrap: wrap; gap: 6px; }
.hotel-tag { font-size: 10px; padding: 2px 8px; background: var(--mist); color: var(--river); border-radius: 10px; }

/* BUDGET */
.budget-wrap { display: grid; grid-template-columns: 1fr 1.2fr; gap: 20px; align-items: start; }
@media(max-width:600px) { .budget-wrap { grid-template-columns: 1fr; } }
.budget-chart-box { background: var(--gorge); padding: 24px; border-radius: 4px; }
.bc-title { font-size: 10px; letter-spacing: 3px; color: rgba(255,255,255,0.4); margin-bottom: 16px; text-transform: uppercase; }
.donut-row { display: flex; align-items: center; gap: 20px; }
.donut { width: 110px; height: 110px; flex-shrink: 0; }
.bc-legends { flex: 1; }
.bc-leg { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; font-size: 11px; color: rgba(255,255,255,0.8); }
.bc-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
.bc-pct { margin-left: auto; color: #7dd3f0; font-size: 10px; }
.budget-bars { display: flex; flex-direction: column; gap: 10px; }
.bb-row { display: flex; align-items: center; gap: 10px; }
.bb-name { font-size: 12px; color: var(--ink); min-width: 72px; }
.bb-track { flex: 1; height: 6px; background: rgba(42,95,122,0.1); border-radius: 3px; overflow: hidden; }
.bb-fill { height: 100%; border-radius: 3px; transition: width 1.4s cubic-bezier(0.22,1,0.36,1); }
.bb-val { font-size: 12px; color: var(--amber); min-width: 52px; text-align: right; }
.budget-total { margin-top: 16px; padding-top: 12px; border-top: 1px dashed rgba(42,95,122,0.2); display: flex; justify-content: space-between; align-items: center; }
.budget-total .label { font-size: 12px; color: var(--stone); }
.budget-total .val { font-size: 20px; font-weight: 700; color: var(--river); font-family: 'Playfair Display', serif; }

/* TRANSPORT */
.transit-table { width: 100%; border-collapse: collapse; }
.transit-table th { background: var(--river); color: white; font-size: 11px; letter-spacing: 2px; font-weight: 400; padding: 10px 14px; text-align: left; }
.transit-table td { padding: 10px 14px; font-size: 12px; border-bottom: 1px solid rgba(42,95,122,0.08); color: var(--ink); line-height: 1.6; }
.transit-table tr:last-child td { border-bottom: none; }
.transit-table tr:nth-child(even) td { background: rgba(42,95,122,0.03); }

/* TIPS */
.tips-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media(max-width:580px) { .tips-grid { grid-template-columns: 1fr; } }
.tip-card { background: white; border: 1px solid rgba(42,95,122,0.1); padding: 16px; display: flex; gap: 12px; }
.tip-icon { font-size: 22px; flex-shrink: 0; }
.tip-title { font-size: 13px; font-weight: 600; color: var(--ink); margin-bottom: 4px; }
.tip-text { font-size: 12px; color: var(--stone); line-height: 1.7; }

.footer { text-align: center; padding: 40px 20px; border-top: 1px solid rgba(42,95,122,0.12); color: var(--stone); font-size: 12px; letter-spacing: 2px; }
.footer strong { color: var(--river); }
.print-btn { position: fixed; bottom: 28px; right: 28px; background: var(--river); color: white; border: none; padding: 12px 22px; font-family: 'Noto Serif SC', serif; font-size: 12px; letter-spacing: 2px; cursor: pointer; border-radius: 24px; box-shadow: 0 4px 20px rgba(42,95,122,0.35); transition: transform 0.2s, box-shadow 0.2s; z-index: 99; }
.print-btn:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(42,95,122,0.45); }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
</head>
<body>
<div id="app"></div>
<button class="print-btn" onclick="saveAsImage()">📷 保存为图片</button>


<script>
// ═══════════════════════════════════════════════
//  JSON 注入口（三种方式任选其一）
// ═══════════════════════════════════════════════

// 方式A：直接粘贴 JSON（把 null 替换为 JSON 对象）
const TRAVEL_DATA = null;

// 方式B：URL参数 ?id=<jsonbin_id> 或 ?data=<base64>
function getFromURL() {
  return null; // 异步处理，见下方 init
}

async function fetchFromJsonBin(id) {
  const res = await fetch(`https://api.jsonbin.io/v3/b/${id}/latest`, {
    headers: { 'X-Master-Key': '$2a$10$XOIlV.V/iUrd1I5VozXKVeOAH8BOCbV5jranTECPAAqMfnxoL9Cc6' }
  });
  const json = await res.json();
  return json.record;
}

// 方式C：iframe postMessage
window.addEventListener('message', e => {
  if (e.data && e.data.type === 'TRAVEL_DATA') renderAll(e.data.payload);
});

// ═══ 工具 ═══
const COLORS = ['#2a5f7a','#8b6914','#d4820a','#2e7d52','#7dd3f0','#c0392b'];
function esc(s) { return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// ═══ 渲染入口 ═══
function renderAll(d) {
  if (!d || !d.title) { document.getElementById('app').innerHTML = '<div style="padding:60px;text-align:center;color:#888">⚠️ 数据加载失败，请检查 JSON 格式</div>'; return; }
  const total = (d.budget||[]).reduce((s,b)=>s+(b.amount||0),0);
  const maxAmt = Math.max(...(d.budget||[]).map(b=>b.amount||0), 1);
  document.getElementById('app').innerHTML =
    renderHero(d) +
    '<div class="page">' +
    renderOverview(d.overview) +
    renderTimeline(d.days||[]) +
    renderSpots(d.spots||[]) +
    renderFoods(d.foods||[]) +
    renderHotels(d.hotels||[]) +
    renderBudget(d.budget||[], total, maxAmt) +
    renderTransport(d.transport||[]) +
    renderTips(d.tips||[], d.footer_tip) +
    '</div>' +
    `<footer class="footer"><strong>皮皮旅游规划师</strong> · ${esc(d.title)} · 数据仅供参考，出行前请核实最新票价</footer>`;
  initBudgetAnim();
}

function renderHero(d) {
  const parts = (d.title||'').split('·');
  const t1 = esc(parts[0]||''), t2 = parts[1] ? `<em>${esc(parts[1])}</em>` : '';
  const badges = (d.badges||[]).map(b=>`<span class="badge">${esc(b)}</span>`).join('');
  return `<div class="hero"><div class="hero-inner">
    <div class="hero-eyebrow">Travel Plan · 旅行计划书</div>
    <h1>${t1}${t2?' · '+t2:''}</h1>
    <div class="hero-sub">${esc(d.subtitle||d.year_season||'')}</div>
    <div class="badges">${badges}</div>
  </div></div>`;
}

function renderOverview(ov) {
  if (!ov) return '';
  const cards = (ov.items||[]).map(i=>`<div class="ov-card"><div class="label">${esc(i.label)}</div><div class="value">${esc(i.value)}</div></div>`).join('');
  const tip = ov.weather_tip ? `<div class="tip-bar" style="margin-top:12px">${esc(ov.weather_tip)}</div>` : '';
  return `<div class="sec-head"><div class="sec-num">01</div><div><div class="sec-label">Overview · 旅行概览</div><div class="sec-sub">核心体验 · 适合人群 · 天气提示</div></div></div>
  <div class="overview-grid">${cards}</div>${tip}`;
}

function renderTimeline(days) {
  if (!days.length) return '';
  const dayWords = ['One','Two','Three','Four','Five','Six','Seven'];
  const items = days.map((day, i) => {
    const slots = (day.slots||[]).map(s => {
      const tags = (s.tags||[]).map(t=>`<span class="slot-tag ${esc(t.type||'')}">${esc(t.text)}</span>`).join('');
      return `<div class="slot">
        <div class="slot-time">${esc(s.time)}</div>
        <div class="slot-icon">${esc(s.emoji)}</div>
        <div class="slot-name">${esc(s.name)}</div>
        <div class="slot-detail">${esc(s.detail)}</div>
        ${tags?`<div class="slot-tags">${tags}</div>`:''}
      </div>`;
    }).join('');
    const isLast = i === days.length - 1;
    return `<div class="day-wrap">
      <div class="day-badge">
        <div class="dn">D${i+1}</div>
        ${!isLast?'<div class="line"></div>':'<div class="line" style="background:rgba(42,95,122,0.1)"></div>'}
      </div>
      <div class="day-card">
        <div class="day-header">
          <div class="day-title">${esc(day.title)}</div>
          <div class="day-route">${esc(day.route||'')}</div>
        </div>
        <div class="slots">${slots}</div>
      </div>
    </div>`;
  }).join('');
  return `<div class="sec-head"><div class="sec-num">02</div><div><div class="sec-label">Itinerary · 时间轴行程</div><div class="sec-sub">${days.length}天详细安排 · 上午 / 下午 / 晚上</div></div></div>
  <div class="timeline">${items}</div>`;
}

function renderSpots(spots) {
  if (!spots.length) return '';
  const cards = spots.map(s=>`<div class="spot-card">
    <div class="spot-top"><div class="spot-emoji">${esc(s.emoji)}</div><span class="spot-priority ${esc(s.priority)}">${esc(s.priority_label)}</span></div>
    <div class="spot-body">
      <div class="spot-name">${esc(s.name)}</div>
      <div class="spot-desc">${esc(s.desc)}</div>
      <div class="spot-meta">${(s.meta||[]).map(m=>`<span>${esc(m)}</span>`).join('')}</div>
    </div>
  </div>`).join('');
  return `<div class="sec-head"><div class="sec-num">03</div><div><div class="sec-label">Spots · 景点推荐</div><div class="sec-sub">${spots.length}处核心景点 · 优先级 · 游览要点</div></div></div>
  <div class="spots-grid">${cards}</div>`;
}

function renderFoods(foods) {
  if (!foods.length) return '';
  const cards = foods.map(f=>`<div class="food-card">
    <div class="food-emoji">${esc(f.emoji)}</div>
    <div>
      <div class="food-name">${esc(f.name)}</div>
      <div class="food-shop">${esc(f.shop)}</div>
      <div class="food-price">${esc(f.price)}</div>
      <div class="food-note">${esc(f.note)}</div>
    </div>
  </div>`).join('');
  return `<div class="sec-head"><div class="sec-num">04</div><div><div class="sec-label">Food · 特色美食</div><div class="sec-sub">${foods.length}道必吃 · 推荐店铺 · 价格参考</div></div></div>
  <div class="food-grid">${cards}</div>`;
}

function renderHotels(hotels) {
  if (!hotels.length) return '';
  const cards = hotels.map(h=>`<div class="hotel-card">
    <div class="hotel-type">${esc(h.type)}</div>
    <div class="hotel-name">${esc(h.name)}</div>
    <div class="hotel-loc">📍 ${esc(h.location)}</div>
    <div class="hotel-price">${esc(h.price)}</div>
    <div class="hotel-tags">${(h.tags||[]).map(t=>`<span class="hotel-tag">${esc(t)}</span>`).join('')}</div>
  </div>`).join('');
  return `<div class="sec-head"><div class="sec-num">05</div><div><div class="sec-label">Stay · 住宿建议</div></div></div>
  <div class="hotel-grid">${cards}</div>`;
}

function renderBudget(budget, total, maxAmt) {
  if (!budget.length) return '';
  const C = 2*Math.PI*45;
  let offset = 0;
  const segs = budget.map((b,i)=>{
    const len = total>0?(b.amount/total)*C:0;
    const s = `<circle cx="60" cy="60" r="45" fill="none" stroke="${COLORS[i%COLORS.length]}" stroke-width="18"
      stroke-dasharray="${len.toFixed(1)} ${(C-len).toFixed(1)}"
      stroke-dashoffset="${(-offset).toFixed(1)}" transform="rotate(-90 60 60)"/>`;
    offset+=len; return s;
  }).join('');
  const legs = budget.map((b,i)=>{
    const pct = total>0?Math.round(b.amount/total*100):0;
    return `<div class="bc-leg"><div class="bc-dot" style="background:${COLORS[i%COLORS.length]}"></div>${esc(b.name)}<span class="bc-pct">${pct}%</span></div>`;
  }).join('');
  const bars = budget.map((b,i)=>{
    const w = maxAmt>0?Math.round(b.amount/maxAmt*100):0;
    return `<div class="bb-row">
      <span class="bb-name">${esc(b.emoji||'')} ${esc(b.name)}</span>
      <div class="bb-track"><div class="bb-fill" data-w="${w}%" style="width:0;background:${COLORS[i%COLORS.length]}"></div></div>
      <span class="bb-val">¥${b.amount.toLocaleString()}</span>
    </div>`;
  }).join('');
  return `<div class="sec-head"><div class="sec-num">06</div><div><div class="sec-label">Budget · 费用预算</div><div class="sec-sub">总计 ¥${total.toLocaleString()}</div></div></div>
  <div class="budget-wrap">
    <div class="budget-chart-box">
      <div class="bc-title">Budget Breakdown</div>
      <div class="donut-row">
        <svg class="donut" viewBox="0 0 120 120">
          <circle cx="60" cy="60" r="45" fill="none" stroke="#0d2a1a" stroke-width="18"/>
          ${segs}
          <text x="60" y="55" text-anchor="middle" fill="#7dd3f0" font-size="13" font-weight="bold" font-family="serif">¥${total.toLocaleString()}</text>
          <text x="60" y="70" text-anchor="middle" fill="rgba(255,255,255,0.4)" font-size="8" font-family="serif">总预算</text>
        </svg>
        <div class="bc-legends">${legs}</div>
      </div>
    </div>
    <div><div class="budget-bars">${bars}</div>
      <div class="budget-total">
        <span class="label">严格控制预算内</span>
        <span class="val">¥${total.toLocaleString()}</span>
      </div>
    </div>
  </div>`;
}

function renderTransport(trans) {
  if (!trans.length) return '';
  const rows = trans.map(t=>`<tr><td>${esc(t.mode)}</td><td>${esc(t.coverage)}</td><td>${esc(t.cost)}</td><td>${esc(t.note)}</td></tr>`).join('');
  return `<div class="sec-head"><div class="sec-num">07</div><div><div class="sec-label">Transport · 交通指南</div></div></div>
  <table class="transit-table"><thead><tr><th>交通方式</th><th>覆盖范围</th><th>费用</th><th>注意事项</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function renderTips(tips, footerTip) {
  if (!tips.length) return '';
  const cards = tips.map(t=>`<div class="tip-card">
    <div class="tip-icon">${esc(t.icon)}</div>
    <div><div class="tip-title">${esc(t.title)}</div><div class="tip-text">${esc(t.text)}</div></div>
  </div>`).join('');
  const ft = footerTip ? `<div class="tip-bar" style="margin-top:16px">${esc(footerTip)}</div>` : '';
  return `<div class="sec-head"><div class="sec-num">08</div><div><div class="sec-label">Tips · 避坑 &amp; 旅行贴士</div></div></div>
  <div class="tips-grid">${cards}</div>${ft}`;
}

async function saveAsImage() {
  const btn = document.querySelector('.print-btn');
  btn.textContent = '⏳ 生成中...';
  btn.disabled = true;

  try {
    // 1. 先让所有动画元素变为可见
    document.querySelectorAll('.day-wrap').forEach(el => {
      el.style.opacity = '1';
      el.style.transform = 'none';
      el.style.animation = 'none';
    });
    document.querySelectorAll('.bb-fill').forEach(el => {
      el.style.width = el.dataset.w || el.style.width;
      el.style.transition = 'none';
    });

    // 2. 等待一帧确保渲染完成
    await new Promise(r => setTimeout(r, 800));

    const target = document.getElementById('app');
    const canvas = await html2canvas(target, {
      scale: 1.5,
      useCORS: true,
      allowTaint: true,
      backgroundColor: '#faf7f0',
      scrollX: 0,
      scrollY: 0,
      x: 0,
      y: 0,
      width: target.scrollWidth,
      height: target.scrollHeight,
      windowWidth: target.scrollWidth,
      windowHeight: target.scrollHeight
    });

    const link = document.createElement('a');
    link.download = '旅行规划.jpg';
    link.href = canvas.toDataURL('image/jpeg', 0.92);
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  } catch(e) {
    alert('保存失败：' + e.message);
  }

  btn.textContent = '📷 保存为图片';
  btn.disabled = false;
}

function initBudgetAnim() {
  const fills = document.querySelectorAll('.bb-fill');
  const obs = new IntersectionObserver(entries => {
    if (entries[0].isIntersecting) { fills.forEach(f=>{ f.style.width=f.dataset.w; }); obs.disconnect(); }
  }, { threshold: 0.3 });
  const s = document.querySelector('.budget-wrap');
  if (s) obs.observe(s);
}

// ═══ 启动 ═══
(async function(){
  const params = new URLSearchParams(window.location.search);
  const id = params.get('id');
  const dataParam = params.get('data');

  if (TRAVEL_DATA) { setTimeout(()=>renderAll(TRAVEL_DATA), 200); return; }

  if (id) {
    document.getElementById('app').innerHTML = '<div style="padding:80px;text-align:center;color:#888;font-family:serif">⏳ 正在加载旅行规划...</div>';
    try {
      const data = await fetchFromJsonBin(id);
      renderAll(data);
    } catch(e) {
      document.getElementById('app').innerHTML = '<div style="padding:80px;text-align:center;color:#c00;font-family:serif">❌ 数据加载失败，请重试</div>';
    }
    return;
  }

  if (dataParam) {
    try {
      const data = JSON.parse(decodeURIComponent(atob(dataParam)));
      setTimeout(()=>renderAll(data), 200);
    } catch(e) {}
    return;
  }

  document.getElementById('app').innerHTML = `<div style="max-width:600px;margin:80px auto;padding:40px;text-align:center;font-family:serif;color:#4a5a5a">
    <div style="font-size:48px;margin-bottom:20px">🗺</div>
    <div style="font-size:18px;color:#2a5f7a;margin-bottom:12px">旅行规划动态模板 v2</div>
    <div style="font-size:13px;line-height:2">请通过 ?id=jsonbin_id 方式访问</div>
  </div>`;
})();
</script>
